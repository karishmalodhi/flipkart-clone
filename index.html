<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flipkart clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
    <h2>Flipkart</h2>

    <input type="text" placeholder="Search Products">

    <button>Login</button>

    <button>Cart</button>
    </header>
    <section class="categories">

    <div class="category">Mobiles</div>
    <div class="category">Laptops</div>
    <div class="category">Fashion</div>
    <div class="category">Electronics</div>
    <div class="category">Grocery</div>

</section>
<section class="products">

    <div class="card">
        <img src="iphone.jpg"alt="iphone">
        <h3>iPhone 15</h3>
        <p>₹79,999</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="hp.jpeg"alt="laptop">
        <h3>HP Laptop</h3>
        <p>₹55,000</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://www.theunitystyle.com/products/nike-sneakers-439-SKU-1569"alt="shoes"
        <h3>Nike Shoes</h3>
        <p>₹3,999</p>
        <button>Add to Cart</button>
    </div>

</section>
<footer>
    <p>>© 2026 Flipkart Clone</p>
</footer>


    <script src="script.js"> </script>
    
</body>
</html>
