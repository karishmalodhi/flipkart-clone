<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flipkart clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
    <h2>Flipkart</h2>

    <input type="text" placeholder="Search Products">

    <button>Login</button>

    <button>Cart</button>
    </header>
    <section class="categories">

    <div class="category">Mobiles</div>
    <div class="category">Laptops</div>
    <div class="category">Fashion</div>
    <div class="category">Electronics</div>
    <div class="category">Grocery</div>

</section>
<section class="banner">
    <h1>Big Billion Days Sale</h1>
    <p>Up to 70% OFF</p>
</section>
<section class="products">

    <div class="card">
        <img src="https://rukminim2.flixcart.com/image/1536/1536/xif0q/mobile/a/c/k/-original-imagtc5fuzkvczr7.jpeg?q=90">
        <h3>iPhone 15</h3>
        <p>⭐⭐⭐⭐⭐</p>
        <p>₹79,999</p>
         <p class="discount">20% OFF</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://ehpworld.com/wp-content/uploads/2021/10/HP14s-Dq2535Tu-left-rearview.jpg">
        <h3>HP Laptop</h3>
         <p>⭐⭐⭐⭐⭐</p>

        <p>₹55,000</p>
        <p class="discount">20% OFF</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://img.thecdn.in/380346/SKU-1569_0-1720948513201.jpg?width=1200&format=webp">
        <h3>Nike Shoes</h3>
         <p>⭐⭐⭐⭐⭐</p>

        <p>₹3,999</p>
         <p class="discount">20% OFF</p>
        <button>Add to Cart</button>
    </div>

</section>
<section class="Featured Brands">
    <h2>Featured Brands</h2>
    <div class="brand-container">
    <div class="brands"><h2>Apple</h2></div>
    <div class="brands"><h2>HP</h2></div>
    <div class="brands"><h2>NIKE</h2></div>
    </div>
</section>

<footer>
    <p>>© 2026 Flipkart Clone</p>
    <p>email:support@flipkartclone.com</p>
</footer>


    <script src="script.js"> </script>
    
</body>
</html>
