<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart</title>

    <style>
        body{
            font-family: Arial;
            background:#f1f3f6;
            padding:20px;
        }

        .cart-container{
            max-width:800px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
        }

        .cart-item{
            display:flex;
            gap:20px;
            align-items:center;
            border-bottom:1px solid #ddd;
            padding:15px 0;
        }

        .cart-item img{
            width:120px;
        }

        .remove-btn{
            background:red;
            color:white;
            border:none;
            padding:6px 12px;
            cursor:pointer;
            margin-top:10px;
        }

        .total{
            text-align:right;
            margin-top:20px;
            font-size:20px;
        }
        .quantity{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:10px;
}

.quantity button{
    width:30px;
    height:30px;
    border:none;
    background:#2874f0;
    color:white;
    border-radius:50%;
    cursor:pointer;
}
.cart-buttons{
    display:flex;
    justify-content:flex-end;
    gap:15px;
    margin-top:20px;
}

.buy-btn{
    background:#fb641b;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

.order-btn{
    background:#2874f0;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

.buy-btn:hover{
    background:#e85b17;
}

.order-btn:hover{
    background:#0b5ed7;
}
    </style>
</head>

<body>

<div class="cart-container">
    <h1>My Cart 🛒</h1>

    <div id="cart-items"></div>

    <div class="total">
        Total: ₹<span id="total">0</span>
    </div>

</div>
<div class="cart-buttons">
    <button id="buyNowBtn" class="buy-btn">Buy Now</button>
    <button id="placeOrderBtn" class="order-btn">Place Order</button>
</div>


<script>
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

const container = document.getElementById("cart-items");
const totalEl = document.getElementById("total");

function renderCart() {
    container.innerHTML = "";
    let total = 0;

    cart.forEach((item, index) => {

        let price = Number(item.price.replace(/[^0-9]/g, ""));

        if (!item.qty) item.qty = 1;

        total += price * item.qty;

        const div = document.createElement("div");
        div.classList.add("cart-item");

        div.innerHTML = `
            <img src="${item.image}">
            <div>
                <h3>${item.name}</h3>
                <p>₹${price}</p>

                <div class="quantity">
                    <button onclick="decreaseQty(${index})">-</button>
                    <span>${item.qty}</span>
                    <button onclick="increaseQty(${index})">+</button>
                </div>

                <button class="remove-btn" onclick="removeItem(${index})">
                    Remove
                </button>
            </div>
        `;

        container.appendChild(div);
    });

    totalEl.innerText = total;
    localStorage.setItem("cart", JSON.stringify(cart));
}

function increaseQty(index){
    cart[index].qty += 1;
    renderCart();
}

function decreaseQty(index){
    if(cart[index].qty > 1){
        cart[index].qty -= 1;
        renderCart();
    }
}

function removeItem(index){
    cart.splice(index,1);
    renderCart();
}

renderCart();
const buyNowBtn = document.getElementById("buyNowBtn");

buyNowBtn.addEventListener("click", () => {

    if(cart.length === 0){
        alert("Your cart is empty!");
        return;
    }

    let total = 0;

    cart.forEach(item=>{
        let price = parseInt(item.price.toString().replace(/[^\d]/g,""));
        total += price * item.qty;
    });

    alert("Proceeding to Payment 💳\nAmount: ₹" + total);
});
const placeOrderBtn = document.getElementById("placeOrderBtn");
placeOrderBtn.addEventListener("click",()=>{

if(cart.length===0){
alert("Cart is Empty");
return;
}

window.location="payment.html";

});
</script>

</body>
</html>
