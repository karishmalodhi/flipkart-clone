<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2874f0,#00c6ff);
}

.signup-box{
    background:white;
    padding:40px;
    width:350px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.signup-box h2{
    color:#2874f0;
    margin-bottom:10px;
}

.signup-box p{
    color:gray;
    margin-bottom:20px;
}

.signup-box input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

.signup-box input:focus{
    outline:none;
    border:2px solid #2874f0;
}

.signup-box button{
    width:100%;
    padding:12px;
    background:#2874f0;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    margin-top:10px;
}

.signup-box button:hover{
    background:#0b5ed7;
}

.login-link{
    margin-top:15px;
    font-size:14px;
}

.login-link a{
    text-decoration:none;
    color:#2874f0;
    font-weight:bold;
}
    </style>
</head>
<body>

    <div class="signup-container">
        <div class="signup-box">
            <h2>Create Account</h2>
            <p>Join Flipkart Today</p>

            <input type="text" placeholder="Full Name">
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
            <input type="password" placeholder="Confirm Password">

            <button id="signup-btn">Sign Up</button>

            <p class="login-link">
                Already have an account?
                <a href="login.html">Login</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById("signup-btn").addEventListener("click", function() {
            alert("Account Created Successfully!");
        });
    </script>

</body>
</html>
