<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Payment</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f1f3f6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:420px;
background:#fff;
padding:30px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.logo{
font-size:28px;
font-weight:700;
color:#2874f0;
margin-bottom:20px;
text-align:center;
}

.amount{
text-align:center;
font-size:26px;
font-weight:700;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

.row{
display:flex;
gap:10px;
}

button{
width:100%;
padding:14px;
background:#2874f0;
color:#fff;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#0b5ed7;
}
</style>

</head>
<body>

<div class="box">

<div class="logo">Razorpay Demo</div>

<div class="amount">
₹ <span id="amount">0</span>
</div>

<input placeholder="Card Holder Name">

<input placeholder="Card Number">

<div class="row">
<input placeholder="MM/YY">
<input placeholder="CVV">
</div>

<button onclick="payNow()">Pay Now</button>

</div>

<script>

let cart=JSON.parse(localStorage.getItem("cart"))||[];

let total=0;

cart.forEach(item=>{
let price=parseInt(item.price.replace(/[^\d]/g,""));
total+=price*item.qty;
});

document.getElementById("amount").innerText=total;

function payNow(){

alert("Payment Successful 🎉");

localStorage.removeItem("cart");

window.location="success.html";

}

</script>

</body>
</html>
