<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f1f2f4;
    font-family:Arial,sans-serif;
}

/* First Horizontal Box */

.navbar{
    width:95%;
    height:70px;

    background:white;

    margin:20px auto 10px;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 20px;

    border-radius:8px;
}

.search-box{
    width:75%;
}

.search-box input{
    width:100%;
    height:48px;

    border:2px solid #2874f0;
    border-radius:8px;

    padding-left:15px;
    font-size:16px;
}

.nav-links{
    display:flex;
    gap:25px;
    font-size:16px;
}

/* Second Horizontal Box */

.category-box{
    width:95%;
    height:65px;

    background:white;

    margin:auto;

    display:flex;
    align-items:center;
    justify-content:space-around;

    border-radius:8px;

    box-shadow:0 1px 4px rgba(0,0,0,.1);
}

.category-box div{
    cursor:pointer;
    font-size:14px;
}
    </style>
</head>
<body>
    <div class="navbar">
    <div class="search-box">
        <input
            type="text"
            placeholder="Search for Products, Brands and More">
    </div>

    <div class="nav-links">
        <span>Login</span>
        <span>More</span>
        <span>🛒 Cart</span>
    </div>
</div>

<div class="category-box">
    <div>For You</div>
    <div>Fashion</div>
    <div>Mobiles</div>
    <div>Beauty</div>
    <div>Electronics</div>
    <div>Home</div>
    <div>Appliances</div>
    <div>Toys</div>
    <div>Books</div>
</div>
    
</body>
</html>
